name: Build catalog

# Regenerate skills.json from catalog.config.json whenever the config changes,
# so a teammate can edit ONE file (even from the GitHub web UI) and the site
# updates itself — no terminal, no Python, no local skill checkout needed.

on:
  push:
    branches: [main]
    paths:
      - catalog.config.json
      - scripts/sync-skills.py
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-catalog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # reads each skill's SKILL.md from its GitHub repo (no local copy needed)
      - name: Regenerate skills.json
        run: python3 scripts/sync-skills.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- skills.json; then
            echo "skills.json already up to date — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add skills.json
            git commit -m "chore: regenerate skills.json from catalog.config.json [skip ci]"
            git push
          fi
