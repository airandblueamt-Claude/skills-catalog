name: Claude Assistant

# OPTIONAL convenience. The primary, keyless way to add skills is editing
# catalog.config.json on github.com (build-catalog.yml rebuilds the site for free).
#
# This lets teammates request changes in plain English: open an issue (or comment)
# and mention @claude — Claude makes the edit and opens a pull request for review.
# It runs on a Claude PRO/MAX SUBSCRIPTION token (no pay-per-use API key needed).
# One-time setup (see docs/TEAM-GUIDE.md): install the Claude GitHub App and add the
# CLAUDE_CODE_OAUTH_TOKEN repository secret (from `claude setup-token`). Without the
# secret this workflow simply no-ops — the keyless paths keep working.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

# least privilege: enough to comment and open PRs, nothing more
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Public repo: only run for people you trust, so strangers can't spend budget.
    if: >
      github.event.comment.author_association == 'OWNER' ||
      github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'COLLABORATOR' ||
      github.event.issue.author_association == 'OWNER' ||
      github.event.issue.author_association == 'MEMBER' ||
      github.event.issue.author_association == 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          # Uses your Claude Pro/Max subscription — NOT a metered API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # cap the work per request
          claude_args: "--max-turns 6"
