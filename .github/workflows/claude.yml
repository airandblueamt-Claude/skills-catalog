name: Claude Assistant

# Lets teammates request changes in plain English: open an issue (or comment)
# and mention @claude — Claude makes the edit and opens a pull request for review.
# One-time setup required (see docs/TEAM-GUIDE.md): install the Claude GitHub App
# and add the ANTHROPIC_API_KEY repository secret. Without the secret this workflow
# simply no-ops.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

# least privilege: enough to comment and open PRs, nothing more
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Public repo: only run for people you trust, so strangers can't spend budget.
    if: >
      github.event.comment.author_association == 'OWNER' ||
      github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'COLLABORATOR' ||
      github.event.issue.author_association == 'OWNER' ||
      github.event.issue.author_association == 'MEMBER' ||
      github.event.issue.author_association == 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # cap the work per request to keep cost predictable
          claude_args: "--max-turns 6"
